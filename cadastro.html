<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - ValorTees</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <header>
        <a href="index.html"><img src="imagem/logooo.png" class="logo"></a>
    </header>

    <main>
        <h1>CADASTRO</h1>
        <form class="bloco_cadastro">
            <input type="text" placeholder="Como quer ser chamado?" required>
            <input type="email" placeholder="Seu melhor e-mail" required>
            <input type="number" placeholder="CPF (só números)" required>
            <input type="date" required>
            <input type="password" placeholder="Crie uma senha" required>

            <button type="submit" class="cadastrar"><a href="login.html">Criar minha conta</a></button>

            <p class="trocar-form">Já é de casa? <a href="login.html">Faz o login aí</a></p>
        </form>
    </main>

        </div>
    </footer>
</body>

</html>
